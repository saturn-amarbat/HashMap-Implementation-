name: C++ CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtest-dev libgmock-dev cmake
        
        # Build GoogleTest from source as Ubuntu package only provides source
        cd /usr/src/gtest
        sudo cmake CMakeLists.txt
        sudo make
        
        # Copy libraries to system lib directory
        # Try both locations as layout differs by version
        sudo cp lib/*.a /usr/lib 2>/dev/null || sudo cp *.a /usr/lib 2>/dev/null || true
        
    - name: Build tests
      run: make hashmap_tests

    - name: Run Core Tests
      run: make test_hashmap_core

    - name: Run All Tests
      run: make test_hashmap_all